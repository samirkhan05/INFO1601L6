<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Load Event</title>
</head>
<body>

  <img id="myImage" src="https://www.placecage.com/200/300" alt="Placeholder"/>

  <script>
    function loaded() {
      console.log('img loaded');
    }

    let myImage = document.querySelector("#myImage");
    myImage.addEventListener("load", loaded);
  </script>

</body>
</html>
